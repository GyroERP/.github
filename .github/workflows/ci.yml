name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  profile-checks:
    name: Profile checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Verify organization profile README
        run: |
          set -euo pipefail
          test -f profile/README.md || { echo "Missing profile/README.md"; exit 1; }
          test -s profile/README.md || { echo "profile/README.md is empty"; exit 1; }
          grep -q "GyroERP" profile/README.md || { echo "Profile must mention GyroERP"; exit 1; }
          grep -q "Muhammad Ahsan" profile/README.md || { echo "Profile must credit founder"; exit 1; }
          grep -q "backend" profile/README.md || { echo "Profile must link backend repo"; exit 1; }
          grep -q "frontend" profile/README.md || { echo "Profile must link frontend repo"; exit 1; }
          grep -q "database" profile/README.md || { echo "Profile must link database repo"; exit 1; }
          echo "Organization profile README validated."

      - name: Verify GitHub scaffolding files
        run: |
          set -euo pipefail
          test -f .github/CODEOWNERS
          test -f .github/workflows/ci.yml
          test -f .github/dependabot.yml
          test -f PROJECT.md
          test -f .github/ISSUE_TEMPLATE/bug_report.yml
          test -f .github/ISSUE_TEMPLATE/feature_request.yml
          test -f .github/ISSUE_TEMPLATE/task.yml
          test -f .github/ISSUE_TEMPLATE/epic.yml
          echo "GitHub scaffolding files present."

  markdown-lint:
    name: Markdown lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Check markdown files are non-empty
        run: |
          set -euo pipefail
          for file in profile/README.md README.md PROJECT.md; do
            test -s "$file" || { echo "Empty or missing: $file"; exit 1; }
          done
